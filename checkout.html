<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Meta Tags de Compartilhamento -->
  <meta property="og:title" content="SoftPower Informática - Sua assistência técnica de confiança">
  <meta property="og:description" content="Assistência técnica, vendas de computadores e periféricos em Carapicuíba. Qualidade e transparência em cada serviço.">
  <meta property="og:image" content="https://softpower-informatica.netlify.app/assets/img/logo.png">
  <meta property="og:url" content="https://softpower-informatica.netlify.app/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Soft Power Informática</title>
  <link rel="icon" href="assets/img/logo.png" type="image/png" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/ecommerce.css" />
</head>
<body>
  <header class="header"><div class="container nav-container"><a href="index.html" class="logo" style="margin-left: auto;"><img src="assets/img/logo.png" alt="SoftPower Informática"></a><nav class="nav"><a href="loja.html" class="nav-link">Loja</a><a href="carrinho.html" class="nav-link">Carrinho</a></nav></div></header>

  <section class="section" style="padding-top:120px;">
    <div class="container checkout-grid">
      <div>
        <h1>Checkout</h1>
        <div class="form-group"><label class="form-label" for="checkout-nome">Nome *</label><input class="form-input" id="checkout-nome" /></div>
        <div class="form-group"><label class="form-label" for="checkout-whatsapp">WhatsApp *</label><input class="form-input" id="checkout-whatsapp" /></div>
        <div class="form-group"><label class="form-label" for="checkout-entrega">Entrega/Retirada *</label><select class="form-select" id="checkout-entrega"><option value="">Selecione</option><option value="retirada">Retirada em loja</option><option value="entrega">Entrega</option></select></div>
        <div class="form-group" id="checkout-endereco-wrap" style="display:none;"><label class="form-label" for="checkout-endereco">Endereço</label><textarea class="form-textarea" id="checkout-endereco"></textarea></div>
        <div class="form-group"><label class="form-label" for="checkout-observacoes">Observações</label><textarea class="form-textarea" id="checkout-observacoes"></textarea></div>

        <div class="shop-actions">
          <button class="btn btn-whatsapp" id="finalize-whatsapp">Finalizar pelo WhatsApp</button>
          <button class="btn btn-outline" id="pay-online">Pagar agora</button>
          <button class="btn btn-outline" id="clear-cart">Limpar carrinho</button>
        </div>
      </div>

      <div>
        <h2>Resumo do pedido</h2>
        <div id="checkout-items" class="budget-form"></div><div id="pix-result" style="margin-top:12px;"></div>
      </div>
    </div>
  </section>

  <script type="module" src="assets/js/checkout.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
