<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftPower Admin - Produtos</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #ff6b00;
      --primary-dark: #e55a00;
      --bg-dark: #1a1a1a;
      --bg-card: #252525;
      --bg-input: #333;
      --text: #fff;
      --text-muted: #aaa;
      --border: #444;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: var(--bg-card);
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      color: var(--primary);
      font-size: 1.2rem;
    }
    
    .header nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
    }
    
    .header nav a:hover, .header nav a.active {
      color: var(--primary);
    }
    
    /* Main Layout */
    .main {
      display: flex;
      height: calc(100vh - 60px);
    }
    
    /* Products Section - 70% */
    .products-section {
      width: 70%;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }
    
    /* Chat Section - 30% */
    .chat-section {
      width: 30%;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
    }
    
    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 10px 15px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
    }
    
    .search-box:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    
    /* Products Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      transition: all 0.2s;
    }
    
    .product-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    .product-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--bg-input);
    }
    
    .product-card h3 {
      margin: 10px 0 5px;
      font-size: 1rem;
    }
    
    .product-card .category {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 10px;
    }
    
    .product-card .price {
      font-size: 1.2rem;
      color: var(--primary);
      font-weight: bold;
    }
    
    .product-card .price .old {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: line-through;
      margin-right: 10px;
    }
    
    .product-card .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }
    
    .badge-promo { background: var(--danger); color: #fff; }
    .badge-new { background: var(--success); color: #fff; }
    .badge-destaque { background: var(--warning); color: #000; }
    
    .product-card .actions {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }
    
    .product-card .btn-edit, .product-card .btn-delete {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .btn-edit { background: var(--bg-input); color: var(--text); }
    .btn-edit:hover { background: var(--primary); }
    .btn-delete { background: var(--bg-input); color: var(--danger); }
    .btn-delete:hover { background: var(--danger); color: #fff; }
    
    /* Chat */
    .chat-header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }
    
    .chat-header h2 {
      font-size: 1rem;
      color: var(--primary);
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    
    .message {
      margin-bottom: 15px;
      padding: 10px 15px;
      border-radius: 12px;
      max-width: 85%;
    }
    
    .message.user {
      background: var(--primary);
      color: #fff;
      margin-left: auto;
      border-bottom-right-radius: 2px;
    }
    
    .message.bot {
      background: var(--bg-input);
      border-bottom-left-radius: 2px;
    }
    
    .message .time {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 5px;
    }
    
    .chat-input {
      padding: 15px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    
    .chat-input input {
      flex: 1;
      padding: 12px 15px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
    }
    
    .chat-input input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .chat-input .btn-send {
      padding: 12px 20px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 25px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-content h2 {
      color: var(--primary);
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .form-group input, 
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 15px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
    }
    
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .modal-actions .btn {
      flex: 1;
    }
    
    .btn-secondary {
      background: var(--bg-input);
      color: var(--text);
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 50px;
      color: var(--text-muted);
    }
    
    .empty-state h3 {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖥️ SoftPower Admin</h1>
    <nav>
      <a href="index.html" class="active">Produtos</a>
      <a href="pedidos.html">Pedidos & Serviços</a>
    </nav>
  </div>
  
  <div class="main">
    <!-- Products Section -->
    <div class="products-section">
      <div class="toolbar">
        <input type="text" class="search-box" id="search" placeholder="Buscar produtos...">
        <select class="search-box" id="filter-category" style="width: auto;">
          <option value="">Todas as categorias</option>
          <option value="Upgrades">Upgrades</option>
          <option value="Periféricos">Periféricos</option>
          <option value="Componentes">Componentes</option>
          <option value="Acessórios">Acessórios</option>
        </select>
        <button class="btn btn-primary" onclick="openModal()">+ Novo Produto</button>
      </div>
      
      <div class="products-grid" id="products-grid">
        <!-- Products will be loaded here -->
      </div>
    </div>
    
    <!-- Chat Section -->
    <div class="chat-section">
      <div class="chat-header">
        <h2>🤖 PowerAdmin</h2>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="message bot">
          Olá! Sou o PowerAdmin. Posso te ajudar a editar produtos, criar descrições e muito mais!
          <div class="time">Agora</div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Digite sua mensagem...">
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
  
  <!-- Edit Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <h2 id="modal-title">Editar Produto</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">
        
        <div class="form-group">
          <label>Nome do Produto</label>
          <input type="text" id="product-name" required>
        </div>
        
        <div class="form-group">
          <label>Categoria</label>
          <select id="product-category">
            <option value="Upgrades (SSD/RAM)">Upgrades (SSD/RAM)</option>
            <option value="Periféricos">Periféricos</option>
            <option value="Componentes">Componentes</option>
            <option value="Acessórios">Acessórios</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Preço (R$)</label>
          <input type="number" step="0.01" id="product-price" required>
        </div>
        
        <div class="form-group">
          <label>Preço Promocional (R$)</label>
          <input type="number" step="0.01" id="product-promo-price">
        </div>
        
        <div class="form-group">
          <label>Estoque</label>
          <input type="number" id="product-stock" value="0">
        </div>
        
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="product-description"></textarea>
        </div>
        
        <div class="form-group">
          <label>URL da Imagem</label>
          <input type="text" id="product-image" placeholder="https://...">
        </div>
        
        <div class="form-group">
          <label>Badge</label>
          <select id="product-badge">
            <option value="">Nenhum</option>
            <option value="Promo">Promo</option>
            <option value="Novo">Novo</option>
            <option value="Best">Best Seller</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>
            <input type="checkbox" id="product-featured"> Em Destaque
          </label>
        </div>
        
        <div class="form-group">
          <label>
            <input type="checkbox" id="product-active" checked> Ativo
          </label>
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Load products from localStorage or default
    let products = JSON.parse(localStorage.getItem('softpower_products')) || [];
    
    // If no products, load from default data
    if (products.length === 0) {
      products = [
        {
          id: 'ssd-sata-480gb',
          nome: 'SSD SATA 480GB Kingston',
          categoria: 'Upgrades (SSD/RAM)',
          preco: 289.90,
          promo_price: 259.90,
          descricao: 'SSD Kingston 480GB SATA 3, velocidades de até 500MB/s',
          imagem: 'https://via.placeholder.com/300x200?text=SSD',
          badge: 'Promo',
          destaque: true,
          estoque: 15,
          ativo: true
        },
        {
          id: 'memoria-ram-16gb',
          nome: 'Memória RAM 16GB DDR4',
          categoria: 'Upgrades (SSD/RAM)',
          preco: 299.90,
          descricao: 'Memória RAM 16GB DDR4 3200MHz Corsair',
          imagem: 'https://via.placeholder.com/300x200?text=RAM',
          badge: 'Novo',
          destaque: true,
          estoque: 8,
          ativo: true
        },
        {
          id: 'mouse-gamer',
          nome: 'Mouse Gamer RGB',
          categoria: 'Periféricos',
          preco: 159.90,
          descricao: 'Mouse gamer com iluminação RGB e sensor óptico de alta precisão',
          imagem: 'https://via.placeholder.com/300x200?text=Mouse',
          badge: '',
          destaque: false,
          estoque: 25,
          ativo: true
        }
      ];
      saveProducts();
    }
    
    function saveProducts() {
      localStorage.setItem('softpower_products', JSON.stringify(products));
    }
    
    function renderProducts() {
      const grid = document.getElementById('products-grid');
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('filter-category').value;
      
      let filtered = products.filter(p => {
        const matchSearch = p.nome.toLowerCase().includes(search) || 
                          p.descricao.toLowerCase().includes(search);
        const matchCategory = !category || p.categoria.includes(category);
        return matchSearch && matchCategory;
      });
      
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <h3>Nenhum produto encontrado</h3>
            <p>Clique em "+ Novo Produto" para adicionar</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = filtered.map(p => `
        <div class="product-card">
          <img src="${p.imagem || 'https://via.placeholder.com/300x200'}" alt="${p.nome}">
          ${p.badge ? `<span class="badge badge-${p.badge.toLowerCase()}">${p.badge}</span>` : ''}
          <h3>${p.nome}</h3>
          <div class="category">${p.categoria}</div>
          <div class="price">
            ${p.promo_price ? `<span class="old">R$ ${p.preco.toFixed(2)}</span>` : ''}
            R$ ${(p.promo_price || p.preco).toFixed(2)}
          </div>
          <div class="actions">
            <button class="btn-edit" onclick="editProduct('${p.id}')">✏️ Editar</button>
            <button class="btn-delete" onclick="deleteProduct('${p.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    
    function openModal(productId = null) {
      const modal = document.getElementById('product-modal');
      const form = document.getElementById('product-form');
      const title = document.getElementById('modal-title');
      
      if (productId) {
        const p = products.find(x => x.id === productId);
        title.textContent = 'Editar Produto';
        document.getElementById('product-id').value = p.id;
        document.getElementById('product-name').value = p.nome;
        document.getElementById('product-category').value = p.categoria;
        document.getElementById('product-price').value = p.preco;
        document.getElementById('product-promo-price').value = p.promo_price || '';
        document.getElementById('product-stock').value = p.estoque;
        document.getElementById('product-description').value = p.descricao || '';
        document.getElementById('product-image').value = p.imagem || '';
        document.getElementById('product-badge').value = p.badge || '';
        document.getElementById('product-featured').checked = p.destaque;
        document.getElementById('product-active').checked = p.ativo;
      } else {
        title.textContent = 'Novo Produto';
        form.reset();
        document.getElementById('product-id').value = '';
        document.getElementById('product-stock').value = 0;
      }
      
      modal.classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('product-modal').classList.remove('active');
    }
    
    function editProduct(id) {
      openModal(id);
    }
    
    function deleteProduct(id) {
      if (confirm('Tem certeza que deseja excluir este produto?')) {
        products = products.filter(p => p.id !== id);
        saveProducts();
        renderProducts();
      }
    }
    
    document.getElementById('product-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const id = document.getElementById('product-id').value;
      const product = {
        id: id || 'produto-' + Date.now(),
        nome: document.getElementById('product-name').value,
        categoria: document.getElementById('product-category').value,
        preco: parseFloat(document.getElementById('product-price').value),
        promo_price: parseFloat(document.getElementById('product-promo-price').value) || 0,
        estoque: parseInt(document.getElementById('product-stock').value),
        descricao: document.getElementById('product-description').value,
        imagem: document.getElementById('product-image').value,
        badge: document.getElementById('product-badge').value,
        destaque: document.getElementById('product-featured').checked,
        ativo: document.getElementById('product-active').checked
      };
      
      if (id) {
        const index = products.findIndex(p => p.id === id);
        products[index] = product;
      } else {
        products.push(product);
      }
      
      saveProducts();
      renderProducts();
      closeModal();
    });
    
    // Search and filter
    document.getElementById('search').addEventListener('input', renderProducts);
    document.getElementById('filter-category').addEventListener('change', renderProducts);
    
    // Chat functionality
    function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message) return;
      
      addMessage(message, 'user');
      input.value = '';
      
      // Simulate bot response
      setTimeout(() => {
        const response = processPowerAdminCommand(message);
        addMessage(response, 'bot');
      }, 500);
    }
    
    function addMessage(text, sender) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.innerHTML = `${text}<div class="time">${new Date().toLocaleTimeString()}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function processPowerAdminCommand(message) {
      const msg = message.toLowerCase();
      
      if (msg.includes('preço') && msg.includes('muda') || msg.includes('altera')) {
        return 'Para alterar o preço, clique no produto desejado e edite o campo "Preço" no formulário. Confirme para aplicar.';
      }
      
      if (msg.includes('descrição') || msg.includes('cria descri')) {
        return 'Posso ajudar a criar uma descrição! Me diz o nome do produto e suas características que gero um texto profissional.';
      }
      
      if (msg.includes('promo') || msg.includes('desconto')) {
        return 'Para criar uma promoção, edite o produto e preencha o "Preço Promocional". Você também pode adicionar um badge como "Promo".';
      }
      
      if (msg.includes('foto') || msg.includes('imagem')) {
        return 'Para alterar a foto, edite o produto e cole a URL da imagem no campo "URL da Imagem".';
      }
      
      if (msg.includes('produto') && msg.includes('lista') || msg.includes('listar')) {
        return `Temos ${products.length} produtos cadastrados. Use a busca above para filtrar por nome ou categoria.`;
      }
      
      return 'Entendi! Para editar um produto, clique no botão "✏️ Editar" no card do produto. Quer que eu ajude com algo específico?';
    }
    
    document.getElementById('chat-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
    
    // Initial render
    renderProducts();
  </script>
</body>
</html>
